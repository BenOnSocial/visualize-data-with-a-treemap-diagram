<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Visualize Data with a Treemap Diagram</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width" />
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="styles.css" />
    <script type="module" src="script.js"></script>
  </head>
  <body>
    <script>
      (function () {
        const PROJECT_NAME = 'tree-map';

        // 1. Set localStorage immediately so the FCC suite picks it up on load
        localStorage.setItem('fcc_test_suite_project', PROJECT_NAME);

        // 2. Poll for the shadow DOM elements
        const pollFCC = setInterval(() => {
          const wrapper = document.getElementById('fcc_test_suite_wrapper');
          if (!wrapper || !wrapper.shadowRoot) return;

          const shadow = wrapper.shadowRoot;
          const selector = shadow.querySelector('#test-suite-selector');
          const runButton = shadow.querySelector('#fcc_test_message-box-rerun-button');

          if (selector) {
            if (selector.value !== PROJECT_NAME) {
              selector.value = PROJECT_NAME;
              // Use bubbles: true as the FCC script likely listens at a higher level
              selector.dispatchEvent(new Event('change', { bubbles: true }));
            }

            // 3. If found, clear the interval and run tests
            if (runButton) {
              clearInterval(pollFCC);
              setTimeout(() => runButton.click(), 500);
            }
          }
        }, 200);
      })();
    </script>

    <header>
      <nav
        class="navbar navbar-expand-lg bg-primary justify-content-center"
        data-bs-theme="dark"
      >
        <div class="navbar-nav">
          <ul class="nav justify-content-center">
            <li class="nav-item">
              <a id="kickstarter" class="nav-link" href="/?data=kickstarter"
                >Kickstarter Data Set</a
              >
            </li>
            <li class="nav-item">
              <a id="movies" class="nav-link" href="/?data=movies">
                Movies Data Set</a
              >
            </li>
            <li class="nav-item">
              <a id="videogames" class="nav-link" href="/?data=videogames"
                >Video Game Data Set</a
              >
            </li>
          </ul>
        </div>
      </nav>
      <div
        id="tooltip"
        style="
          position: absolute;
          opacity: 0;
          background: white;
          padding: 1em;
          border-radius: 5px;
        "
      ></div>
    </header>
    <main class="p-5">
      <h1 id="title"></h1>
      <p id="description"></p>
    </main>
    <div id="legend"></div>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
    <script src="https://cdn.freecodecamp.org/testable-projects-fcc/v1/bundle.js"></script>
  </body>
</html>
